<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portfolio OS</title>

  <!-- pixel fonts: Press Start 2P for display, VT323 for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- desktop + windows are built from js/config.js -->
  <main id="desktop" class="desktop" aria-label="Desktop">
    <div id="icon-layer" class="icon-layer"><!-- desktop icons injected --></div>
    <div id="window-layer" class="window-layer"><!-- windows injected --></div>
  </main>

  <!-- Start menu -->
  <nav id="start-menu" class="start-menu" aria-label="Start menu"></nav>

  <!-- Taskbar -->
  <footer class="taskbar" aria-label="Taskbar">
    <button
      id="start-button"
      class="start-button"
      type="button"
      aria-haspopup="true"
      aria-expanded="false"
    >
      <span class="start-button__face" aria-hidden="true">
        <span class="start-button__screen"></span>
      </span>
      <span class="start-button__text">Start</span>
    </button>

    <div id="process-bar" class="process-bar"><!-- running app tabs injected --></div>

    <div class="tray">
      <span class="tray__speaker" aria-hidden="true">🔊</span>
      <span id="clock" class="tray__clock">--:--</span>
    </div>
  </footer>

  <!-- load order: data, then view, then engine -->
  <script src="js/config.js"></script>
  <script src="js/renderers.js"></script>
  <script src="js/os.js"></script>
</body>
</html>
